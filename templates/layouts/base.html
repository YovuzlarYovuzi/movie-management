<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Aniclac</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/ea9bd22eef.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{% static 'css/jquery.raty.css' %}">
    <link rel="stylesheet" href="{% static 'css/loader.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/modern.css' %}">
    <script>
      (function () {
        try {
          if (!sessionStorage.getItem("aniloader_shown")) {
            document.documentElement.classList.add("show-loader");
          }
        } catch (e) {
          document.documentElement.classList.add("show-loader");
        }
      })();
    </script>
  </head>
  <body>
    <div id="page-loader" class="page-loader" role="status" aria-live="polite" aria-label="Loading" aria-hidden="true">
      <div class="page-loader__stage">
        <svg class="page-loader__art" viewBox="0 0 240 240" aria-hidden="true" focusable="false">
          <defs>
            <linearGradient id="loaderSlash" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#00e5ff" stop-opacity="0" />
              <stop offset="35%" stop-color="#00e5ff" stop-opacity="0.65" />
              <stop offset="65%" stop-color="#ff2bd6" stop-opacity="0.65" />
              <stop offset="100%" stop-color="#ff2bd6" stop-opacity="0" />
            </linearGradient>
            <filter id="loaderGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          <path d="M44 186 C80 172, 160 172, 196 186" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="6" stroke-linecap="round" />

          <g class="loader-fighter">
            <circle cx="96" cy="88" r="18" fill="rgba(255,255,255,0.85)" />
            <path d="M84 106 C86 132, 76 146, 62 164 C58 170, 62 178, 70 178 L120 178 C132 178, 140 170, 132 160 C120 142, 116 130, 110 108 Z"
              fill="rgba(255,255,255,0.80)" />
            <path d="M116 118 C142 116, 160 124, 174 138" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="10" stroke-linecap="round" />

            <g class="loader-sword">
              <path d="M166 132 L212 92" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="6" stroke-linecap="round" />
              <path d="M160 138 L170 128" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="10" stroke-linecap="round" />
            </g>
          </g>

          <path class="loader-slash" d="M64 152 L212 72" fill="none" stroke="url(#loaderSlash)" stroke-width="10" stroke-linecap="round" filter="url(#loaderGlow)" />
          <path class="loader-slash loader-slash--thin" d="M72 164 L214 86" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2" stroke-linecap="round" filter="url(#loaderGlow)" />
        </svg>

        <div class="page-loader__text">
          <div class="page-loader__title">AniBro</div>
          <div class="page-loader__subtitle">Yuklanmoqda…</div>
        </div>
      </div>
    </div>

    {% block navbar %}
      {% include 'includes/navigation.html' %}
    {% endblock navbar %}

    <div class="container-fluid">




      {% block content %}     {% endblock content %}
    </div>

    {% block footer %}
      {% include 'includes/footer.html' %}
    {% endblock footer %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js" integrity="sha256-2Pmvv0kuTBOenSvLm6bvfBSSHrUJ+3A7x6P5Ebd07/g=" crossorigin="anonymous"></script>
    <script src="{% static 'js/jquery.raty.js' %}"></script>
    <script src="{% static 'js/loader.js' %}"></script>
    {% block extra_js %}{% endblock extra_js %}

  </body>

</html>
