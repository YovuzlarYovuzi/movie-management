name: Deploy via SSH

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # sensible example defaults; replace these by adding real values to
      # the repository Secrets (`Settings -> Secrets -> Actions`).
      SSH_HOST: ${{ secrets.SSH_HOST || 'example.com' }}
      SSH_USER: ${{ secrets.SSH_USER || 'deploy' }}
      SSH_PATH: ${{ secrets.SSH_PATH || '/var/www/movie-management' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync files to server
        run: |
          rsync -av --delete --exclude='.env' ./ ${{ env.SSH_USER || env.SSH_USER }}@${{ env.SSH_HOST || env.SSH_HOST }}:${{ env.SSH_PATH || env.SSH_PATH }}
        env:
          SSH_AUTH_SOCK: ${{ env.SSH_AUTH_SOCK }}

      - name: Run remote deploy commands
        run: |
          ssh ${{ env.SSH_USER || env.SSH_USER }}@${{ env.SSH_HOST || env.SSH_HOST }} "cd ${{ env.SSH_PATH || env.SSH_PATH }} && . .venv/bin/activate || true && pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput && sudo systemctl restart gunicorn || true"
